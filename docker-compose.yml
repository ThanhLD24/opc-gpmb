version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: opc_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opc_gpmb}
      POSTGRES_USER: ${POSTGRES_USER:-opc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "${POSTGRES_PORT:-35432}:5432"   # host:container — external port 35432

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opc} -d ${POSTGRES_DB:-opc_gpmb}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - opc_network

    security_opt:
      - no-new-privileges:true

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: opc_backend
    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opc}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-opc_gpmb}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      UPLOAD_DIR: /app/uploads
      API_URL: ${API_URL:-http://localhost:38081}

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - backend_uploads:/app/uploads

    ports:
      - "${BACKEND_PORT:-38081}:8000"    # host:container — external port 38081

    networks:
      - opc_network

    security_opt:
      - no-new-privileges:true

  # ─── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: opc_frontend
    restart: unless-stopped

    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:38081}
      NODE_ENV: production
      PORT: 3000

    depends_on:
      - backend

    ports:
      - "${FRONTEND_PORT:-38080}:3000"   # host:container — external port 38080

    networks:
      - opc_network

    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  opc_network:
    driver: bridge
